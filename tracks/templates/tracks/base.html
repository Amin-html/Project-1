<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}TrackBooking{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a1a; color: white; }
        nav {
            background: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e74c3c;
        }
        .logo { color: #e74c3c; font-size: 22px; font-weight: bold; text-decoration: none; }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 15px;
        }
        .nav-links a:hover { color: #e74c3c; }
        .btn-logout {
            background: #e74c3c;
            padding: 6px 14px;
            border-radius: 5px;
            color: white !important;
        }
        .content { padding: 30px; }
    </style>
</head>
<body>
    <nav>
        <a class="logo" href="/tracks/">🏎️ TrackBooking</a>
        <div class="nav-links">
            <a href="/tracks/">Треки</a>
            {% if user.is_authenticated %}
                <a href="/bookings/my">Мои бронирования</a>
                <span style="color:#aaa;">{{ user.username }}</span>
                <a href="/accounts/logout/" class="btn-logout">Выйти</a>
            {% else %}
                <a href="/accounts/login/">Войти</a>
                <a href="/accounts/register/">Регистрация</a>
            {% endif %}
        </div>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
