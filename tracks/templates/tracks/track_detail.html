<!DOCTYPE html>
<html>
<head>
    <title>{{ track.name }}</title>
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; padding: 20px; }
        .back { color: #e74c3c; text-decoration: none; }
        .card {
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            max-width: 700px;
        }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-body { padding: 25px; }
        h1 { color: #e74c3c; }
        .price { font-size: 28px; font-weight: bold; color: #e74c3c; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #e74c3c;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <a class="back" href="/tracks">← Все треки</a>
    <br><br>
    <div class="card">
        {% if track.image %}
            <img src="{{ track.image.url }}" alt="{{ track.name }}">
        {% endif %}
        <div class="card-body">
            <h1>{{ track.name }}</h1>
            <p>{{ track.description }}</p>
            <p>📏 Длина: {{ track.length_km }} км</p>
            <p class="price">{{ track.price_per_hour }} сом/час</p>
            <a class="btn" href="/bookings/create/{{ track.pk }}/">🏁 Забронировать</a>
        </div>
    </div>
</body>
</html>
