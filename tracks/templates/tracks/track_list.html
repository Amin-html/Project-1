<!DOCTYPE html>
<html>
<head>
    <title>Треки</title>
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; padding: 20px; }
        h1 { color: #e74c3c; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card {
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card h2 { margin: 0 0 10px; font-size: 18px; }
        .price { color: #e74c3c; font-size: 20px; font-weight: bold; }
        .length { color: #aaa; font-size: 14px; }
        a { text-decoration: none; color: white; }
    </style>
</head>
<body>
    <h1>🏎️ Треки</h1>
    <div class="grid">
        {% for track in tracks %}
        <a href="/tracks/{{ track.pk }}/">
            <div class="card">
                {% if track.image %}
                    <img src="{{ track.image.url }}" alt="{{ track.name }}">
                {% else %}
                    <div style="height:200px; background:#333; display:flex; align-items:center; justify-content:center;">
                        🏎️
                    </div>
                {% endif %}
                <div class="card-body">
                    <h2>{{ track.name }}</h2>
                    <p class="length">📏 {{ track.length_km }} км</p>
                    <p class="price">{{ track.price_per_hour }} сом/час</p>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
