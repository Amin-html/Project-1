<!DOCTYPE html>
<html>
<head>
    <title>Отмена бронирования</title>
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; padding: 20px; }
        .card {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
        }
        h1 { color: #e74c3c; }
        .btn-cancel {
            padding: 12px 25px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 15px;
        }
        a { color: #aaa; display: block; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>❌ Отменить бронирование?</h1>
        <p><b>Трек:</b> {{ booking.track.name }}</p>
        <p><b>Дата:</b> {{ booking.date }}</p>
        <p><b>Время:</b> {{ booking.start_time }} — {{ booking.end_time }}</p>
        <p><b>Стоимость:</b> {{ booking.total_price }} сом</p>
        <form method="POST">
            {% csrf_token %}
            <button class="btn-cancel" type="submit">Да, отменить</button>
        </form>
        <a href="/bookings/my/">← Назад</a>
    </div>
</body>
</html>
